# ardconfig defaults
# Command-line flags override these values.

# Boards to install (comma-separated): uno-q, r4wifi, giga
ARDCONFIG_BOARDS="uno-q,r4wifi,giga"

# Python virtual environment path (relative to caller's working directory)
ARDCONFIG_VENV_PATH=".venv"

# Additional Python packages to install in venv (space-separated)
ARDCONFIG_PYTHON_PACKAGES="pyserial"

# arduino-cli version (empty = install latest)
ARDCONFIG_CLI_VERSION=""
